<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="unitcoverter.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="first-background">
            <div id="main">
                <h1>Metric/Imperial Unit Conversion</h1>
                <input type="text" id="number-to-covert">
                <button id="button">Convert</button>
            </div>
        </div>
        <div class="second-background">
            <div class="groups">
                <h3>Length (Meter/Feet)</h3>
                <p id="supporting-text"></p>
            </div>
            <div class="groups">
                <h3>Volume(Liter/Gallons)</h3>
                <p id="supporting-textwo"></p>
            </div>
            <div class="groups">
                <h3>Mass(kilograms/Pounds)</h3>
                <p id="supporting-texthree"></p>
            </div>
        </div>
        <script src="unitcoverter.js"></script>
    </body>
</html>
